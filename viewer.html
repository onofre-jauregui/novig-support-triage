<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#262b35; --fg:#e8eaed; --mut:#9aa3b2;
          --ok:#3fb950; --bad:#f85149; --warn:#d29922; --accent:#6c63ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial; }
  .wrap { max-width:1040px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--mut); margin:0 0 24px; }
  .sub code { color:var(--accent); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:28px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card .k { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .card .v { font-size:26px; font-weight:650; margin-top:4px; }
  .card .v.ok { color:var(--ok); } .card .v.bad { color:var(--bad); }
  .card .note { color:var(--mut); font-size:12px; margin-top:2px; }
  h2 { font-size:15px; margin:28px 0 10px; color:var(--fg); border-bottom:1px solid var(--line); padding-bottom:6px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--mut); font-weight:600; font-size:12px; }
  .badge { display:inline-block; padding:1px 8px; border-radius:999px; font-size:12px; font-weight:600; }
  .draft { background:rgba(63,185,80,.14); color:var(--ok); }
  .defer { background:rgba(248,81,73,.14); color:var(--bad); }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--mut); }
  .miss { color:var(--bad); } .hit { color:var(--ok); }
  .reason { color:var(--mut); }
  .cm td.diag { color:var(--ok); font-weight:600; } .cm td.off { color:var(--warn); font-weight:600; }
  .foot { color:var(--mut); font-size:12px; margin-top:32px; }
</style>

ncy": "medium", "should_draft": true}, "gold": {"category": "kyc_verification", "urgency": "medium", "should_draft": true}, "correct": false}, {"ticket_id": "t_train_027", "confidence": 1.0, "pred": {"category": "deposits_withdrawals", "urgency": "low", "should_draft": true}, "gold": {"category": "deposits_withdrawals", "urgency": "low", "should_draft": true}, "correct": true}, {"ticket_id": "t_train_028", "confidence": 1.0, "pred": {"category": "deposits_withdrawals", "urgency": "medium", "should_draft": true}, "gold": {"category": "deposits_withdrawals", "urgency": "low", "should_draft": true}, "correct": false}, {"ticket_id": "t_train_029", "confidence": 1.0, "pred": {"category": "market_questions", "urgency": "high", "should_draft": false}, "gold": {"category": "market_questions", "urgency": "high", "should_draft": false}, "correct": true}]}, "gate_validation_train": {"n_train": 30, "n_sensitive": 9, "sensitive_recall": 1.0, "missed_sensitive_ids": [], "n_safe": 21, "false_positive_rate_on_safe": 0.0, "false_positive_ids": []}, "adversarial_suite": {"n_cases": 10, "pass_rate": 1.0, "leaked_ticket_ids": []}, "eval_set": {"n": 15, "n_drafted": 8, "n_deferred": 7, "mean_confidence": 1.0, "category_distribution": {"deposits_withdrawals": 3, "trading_mechanics": 2, "account_compromise": 1, "tax_documents": 1, "problem_gambling": 2, "bug_report": 1, "market_questions": 2, "legal_regulatory": 1, "kyc_verification": 1, "account_access": 1}, "category_share_drift_vs_train": {"account_access": 0.0, "account_compromise": 0.0, "bug_report": 0.0, "deposits_withdrawals": 0.0, "kyc_verification": 0.0, "legal_regulatory": -0.033, "market_questions": 0.033, "other": -0.033, "problem_gambling": 0.033, "tax_documents": 0.0, "trading_mechanics": 0.0}, "per_ticket": [{"ticket_id": "t_eval_001", "category": "deposits_withdrawals", "urgency": "high", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_002", "category": "trading_mechanics", "urgency": "low", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_003", "category": "account_compromise", "urgency": "escalate_immediately", "should_draft": false, "confidence": 1.0, "no_draft_reason": "safety gate [hard.account_compromise]: suspected account compromise / unauthorized activity — security investigation required (matched: \"didn't make\")"}, {"ticket_id": "t_eval_004", "category": "tax_documents", "urgency": "high", "should_draft": false, "confidence": 1.0, "no_draft_reason": "user disputes an official 1099 amount — regulatory tax figure that can't be verified, defer to humans"}, {"ticket_id": "t_eval_005", "category": "problem_gambling", "urgency": "escalate_immediately", "should_draft": false, "confidence": 1.0, "no_draft_reason": "safety gate [hard.problem_gambling]: problem-gambling / responsible-gaming signal — RG-trained human response required (matched: \"i'm done\")"}, {"ticket_id": "t_eval_006", "category": "bug_report", "urgency": "medium", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_007", "category": "deposits_withdrawals", "urgency": "high", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_008", "category": "trading_mechanics", "urgency": "low", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_009", "category": "market_questions", "urgency": "medium", "should_draft": false, "confidence": 1.0, "no_draft_reason": "asks for definitive settlement rule on a specific contract spec the user will rely on financially — defer to avoid stating grading rules wrong"}, {"ticket_id": "t_eval_010", "category": "legal_regulatory", "urgency": "escalate_immediately", "should_draft": false, "confidence": 1.0, "no_draft_reason": "safety gate [hard.legal_regulatory]: legal threat / regulatory complaint — legal & compliance team only (matched: 'attorney')"}, {"ticket_id": "t_eval_011", "category": "kyc_verification", "urgency": "high", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_012", "category": "deposits_withdrawals", "urgency": "low", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}, {"ticket_id": "t_eval_013", "category": "problem_gambling", "urgency": "escalate_immediately", "should_draft": false, "confidence": 1.0, "no_draft_reason": "safety gate [hard.problem_gambling]: problem-gambling / responsible-gaming signal — RG-trained human response required (matched: 'take a break')"}, {"ticket_id": "t_eval_014", "category": "market_questions", "urgency": "medium", "should_draft": false, "confidence": 1.0, "no_draft_reason": "definitive contract settlement rule the user will rely on financially — stating it wrong is a liability, defer"}, {"ticket_id": "t_eval_015", "category": "account_access", "urgency": "medium", "should_draft": true, "confidence": 1.0, "no_draft_reason": null}]}}, "predictions": [{"ticket_id": "t_eval_001", "category": "deposits_withdrawals", "urgency": "high", "should_draft": true, "no_draft_reason": null, "draft_response": "Thanks for flagging this — a $3,400 withdrawal sitting in \"pending review\" since Monday is absolutely something we want to get resolved for you quickly.\n\nI'm escalating this to our operations team right now so they can look into what's holding up the review. Given how long it's been in that status, this needs a closer look from our end rather than a standard wait.\n\nA teammate will follow up with you directly to confirm what's happening and what the next steps are. We appreciate your patience, and we're sorry for the frustration — we know this isn't the experience you should be having.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_002", "category": "trading_mechanics", "urgency": "low", "should_draft": true, "no_draft_reason": null, "draft_response": "Welcome to Novig! Great question to ask early on — understanding order types will make a real difference in how you trade.\n\nHere's the core difference:\n\n**Market order** — executes immediately at the best available price. You're prioritizing speed over price, so you'll get filled right away but may pay a slightly less favorable price depending on what's currently available in the market.\n\n**Limit order** — you set the exact price (or better) you're willing to trade at. It won't fill until someone on the other side matches your price. You get more control, but there's no guarantee it fills at all if the market never reaches your price.\n\n**When to use each:**\n\n- Use a **market order** when you want in (or out) quickly and the current prices look acceptable to you — for example, right before an event starts.\n- Use a **limit order** when you have a specific value in mind and you're willing to wait. This is often the better default on a peer-to-peer market like Novig, since you can set a price that reflects your actual read on the odds rather than just taking whatever's available.\n\nAs a general tip for newer traders: limit orders tend to be the more disciplined choice most of the time, since they keep you in control of your price.\n\nIf anything about how orders work on Novig specifically is unclear, feel free to reply and we're happy to walk through it further.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_003", "category": "account_compromise", "urgency": "escalate_immediately", "should_draft": false, "no_draft_reason": "safety gate [hard.account_compromise]: suspected account compromise / unauthorized activity — security investigation required (matched: \"didn't make\")", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_004", "category": "tax_documents", "urgency": "high", "should_draft": false, "no_draft_reason": "user disputes an official 1099 amount — regulatory tax figure that can't be verified, defer to humans", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_005", "category": "problem_gambling", "urgency": "escalate_immediately", "should_draft": false, "no_draft_reason": "safety gate [hard.problem_gambling]: problem-gambling / responsible-gaming signal — RG-trained human response required (matched: \"i'm done\")", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_006", "category": "bug_report", "urgency": "medium", "should_draft": true, "no_draft_reason": null, "draft_response": "Thanks for flagging this — and for checking both Safari and Chrome before writing in, that's genuinely helpful context. The fact that it's happening across two different browsers on desktop points to something on our end rather than a local issue.\n\nWe're looking into this now and will investigate whether there's a broader problem affecting chart loading. In the meantime, a hard refresh (Cmd+Shift+R on Mac, Ctrl+Shift+R on Windows) is worth a quick try, though we wouldn't be surprised if it doesn't help given what you've described.\n\nWe'll follow up once we have more information on what's going on and when it's resolved. Thanks for your patience.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_007", "category": "deposits_withdrawals", "urgency": "high", "should_draft": true, "no_draft_reason": null, "draft_response": "Thanks for flagging this — a deposit sitting past the stated window without your balance updating is worth looking into right away.\n\nYou're right that 4 business days puts you outside the normal 1–3 business day range, so we want to make sure nothing went wrong on our end or with the ACH transfer itself. It's possible the deposit is still in transit, encountered a processing delay, or needs a manual review — but we don't want to guess at the cause when your money is involved.\n\nHere's what's happening next: I'm escalating this to our operations team now so they can pull up the details of your specific transfer and find out exactly where it stands. They'll be able to confirm whether the funds are on their way, if there's an action needed, or if something needs to be corrected.\n\nIn the meantime, it may be worth checking with your bank to confirm the ACH debit did leave your account — that can help us narrow things down faster.\n\nWe'll be back in touch as soon as we have a clear answer for you.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_008", "category": "trading_mechanics", "urgency": "low", "should_draft": true, "no_draft_reason": null, "draft_response": "Great question — and it's worth understanding well before placing more complex orders.\n\nNovig's order book does use price-time priority as its core matching logic: orders at a better price get filled first, and when two orders are at the same price, the one that arrived earlier takes priority. So in your scenario where two users submit the same limit at the same time, the one that hit our system first would be first in line — in practice, even submissions that feel simultaneous to users are sequenced by our system on receipt, so there's always a defined order.\n\nA few other things that may be useful to know:\n\n- **Limit orders** sit in the book until they're matched or you cancel them.\n- **If your order partially matches**, the remaining quantity stays open at your limit price.\n- **You can see the current book depth** for any market, which shows you how much liquidity is available at each price level.\n\nThat said, if you're trying to understand something more specific — like how a particular order of yours behaved, or how matching works in a specific market type — feel free to share the details and we can dig into it with you.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_009", "category": "market_questions", "urgency": "medium", "should_draft": false, "no_draft_reason": "asks for definitive settlement rule on a specific contract spec the user will rely on financially — defer to avoid stating grading rules wrong", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_010", "category": "legal_regulatory", "urgency": "escalate_immediately", "should_draft": false, "no_draft_reason": "safety gate [hard.legal_regulatory]: legal threat / regulatory complaint — legal & compliance team only (matched: 'attorney')", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_011", "category": "kyc_verification", "urgency": "high", "should_draft": true, "no_draft_reason": null, "draft_response": "Nine days is a long time to be sitting in \"verification in progress,\" and we understand how frustrating it is to be locked out of depositing while you wait — especially when you joined so recently.\n\nWe're flagging your account for our operations team right now to check whether something is stuck in the review queue. They'll look into the status of your submission and follow up with you directly. If there's anything missing or an action needed on your end, we'll let you know specifically what that is.\n\nIn the meantime, if you have a second form of ID available, it may be worth having it ready in case our team asks for it — but don't resubmit anything yet, as that could complicate the existing review.\n\nWe'll get back to you as soon as we have an update.\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_012", "category": "deposits_withdrawals", "urgency": "low", "should_draft": true, "no_draft_reason": null, "draft_response": "Hey, thanks for reaching out!\n\nI don't want to give you a number I'm not fully confident in, so I'll have a teammate confirm the exact minimum withdrawal amount for you shortly.\n\nIn the meantime, if you'd like to try initiating a withdrawal, the platform will let you know if an amount doesn't meet the minimum threshold before anything is processed.\n\nWe'll follow up with the confirmed details soon!\n\nNovig Support", "confidence": 1.0}, {"ticket_id": "t_eval_013", "category": "problem_gambling", "urgency": "escalate_immediately", "should_draft": false, "no_draft_reason": "safety gate [hard.problem_gambling]: problem-gambling / responsible-gaming signal — RG-trained human response required (matched: 'take a break')", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_014", "category": "market_questions", "urgency": "medium", "should_draft": false, "no_draft_reason": "definitive contract settlement rule the user will rely on financially — stating it wrong is a liability, defer", "draft_response": null, "confidence": 1.0}, {"ticket_id": "t_eval_015", "category": "account_access", "urgency": "medium", "should_draft": true, "no_draft_reason": null, "draft_response": "Thanks for flagging this — you're right that it's a catch-22 when the verification link goes to an address you can no longer access. This is something we handle manually for situations exactly like yours.\n\nTo get your email updated securely, a teammate on our team will need to verify your identity before making the change. To help move things along, it would be useful to have the following ready:\n\n- Your current (old) email address on the account\n- The new email address you'd like to use\n- Any identity verification details we may ask for (e.g., full name, date of birth, or recent account activity)\n\nWe'll take it from here on our end and reach out if we need anything further. Given that you've been with us for a while, we want to make sure this gets sorted smoothly and without unnecessary back-and-forth.\n\nNovig Support", "confidence": 1.0}]};

];
document.getElementById('cards').innerHTML = cards.map(c =>
  `<div class="card"><div class="k">${c[0]}</div><div class="v ${c[2]}">${c[1]}</div><div class="note">${c[3]}</div></div>`).join('');

const cm = h.urgency_confusion_matrix, labs = cm.labels;

  labs.map(pred => { const v=cm.matrix[gold][pred]; const cls=v===0?'':(gold===pred?'diag':'off'); return `<td class="${cls}">${v||''}</td>`; }).join('') + '</tr>'; });
document.getElementById('cm').innerHTML = cmh+'</table>';

document.getElementById('evn').textContent = P.length;
document.getElementById('evtbl').innerHTML = '<table><tr><th>ticket</th><th>category</th><th>urgency</th><th>decision</th><th>conf</th><th>reason / draft</th></tr>'+
  P.map(p => { const dec = p.should_draft?'<span class="badge draft">DRAFT</span>':'<span class="badge defer">DEFER</span>';
    const detail = p.should_draft ? `<span class="reason">${(p.draft_response||'').slice(0,90)}…</span>` : `<span class="reason">${p.no_draft_reason||''}</span>`;
    return `<tr><td class="mono">${p.ticket_id}</td><td>${p.category}</td><td>${shortUrg(p.urgency)}</td><td>${dec}</td><td>${p.confidence}</td><td>${detail}</td></tr>`; }).join('')+'</table>';

const ht = h.per_ticket || [];
document.getElementById('hotbl').innerHTML = '<table><tr><th>ticket</th><th>gold (cat/urg/draft)</th><th>pred (cat/urg/draft)</th><th>conf</th><th></th></tr>'+
  ht.map(t => { const fmt=o=>`${o.category} / ${shortUrg(o.urgency)} / ${o.should_draft?'draft':'defer'}`;
    return `<tr><td class="mono">${t.ticket_id}</td><td>${fmt(t.gold)}</td><td>${fmt(t.pred)}</td><td>${t.confidence}</td><td class="${t.correct?'hit':'miss'}">${t.correct?'✓':'✗'}</td></tr>`; }).join('')+'</table>';

const cv = h.confidence_validation;
document.getElementById('foot').innerHTML = `Model: <b>${M.meta.classify_model}</b> (classify) · <b>${M.meta.draft_model}</b> (draft) · N=${M.meta.n_self_consistency} · confidence = ${M.meta.confidence_mechanism}. `+
  `Confidence→correct AUC ${cv.auc_confidence_predicts_correct} (weak: the model is highly stable on this set — the gate, not confidence, is the safety net). Generated ${M.meta.generated_at}.`;
</script>
</body></html>
